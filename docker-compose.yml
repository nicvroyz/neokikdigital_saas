version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neokik-db
    restart: always
    environment:
      POSTGRES_USER: neokik_admin
      POSTGRES_PASSWORD: StrongPassword123!
      POSTGRES_DB: neokik_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neokik-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: neokik_admin
      DB_PASSWORD: StrongPassword123!
      DB_NAME: neokik_saas
      JWT_SECRET: neokik_super_secret_jwt_key_2026
    depends_on:
      - postgres

volumes:
  postgres_data:
