services:
  postgres:
    image: postgres:15-alpine
    container_name: neokik-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-neokik_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-neokik_saas}
    # Removed ports mapping for PostgreSQL to lock down database security
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-neokik_admin} -d $${POSTGRES_DB:-neokik_saas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neokik-api
    restart: always
    # Removed ports mapping for Backend to route all traffic exclusively via Caddy
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-neokik_admin}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-neokik_saas}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neokik-frontend
    restart: always
    depends_on:
      - backend

  caddy:
    image: caddy:latest
    container_name: neokik-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
